server:
  port: 0

spring:
  application:
    name: msg-executor-test
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:msg_test;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password:
  redis:
    host: localhost
    port: 6379

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

rocketmq:
  name-server: localhost:9876
  consumer:
    group: msg-executor-test-consumer-group
  producer:
    group: msg-executor-test-producer-group

logging:
  level:
    com.msg: DEBUG
