server:
  port: 8083
  shutdown: graceful

spring:
  application:
    name: mq-delivery
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/mq_delivery?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000
  redis:
    host: localhost
    port: 6379
    password:
    database: 0
    lettuce:
      pool:
        max-active: 16
        max-idle: 8
        min-idle: 4
        max-wait: 3000ms
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 10
        concurrency: 5
        max-concurrency: 20
        retry:
          enabled: false
  lifecycle:
    timeout-per-shutdown-phase: 60s

# Dubbo RPC 配置
dubbo:
  application:
    name: mq-delivery
  protocol:
    name: dubbo
    port: 20883
  registry:
    address: nacos://localhost:8848
  scan:
    base-packages: com.msg.delivery.service.impl

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# MQ Delivery 配置
mq:
  queue:
    main: mq.delivery.main
    receipt: mq.delivery.receipt
    dlq: mq.delivery.dlq
  retry:
    max-attempts: 5
    initial-delay-seconds: 1
    max-delay-seconds: 300
  http:
    connection-timeout-seconds: 5
    read-timeout-seconds: 30
  lock:
    timeout-seconds: 60

# 日志配置
logging:
  level:
    com.msg: DEBUG
    org.springframework.amqp: INFO
    org.springframework.data.redis: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
  file:
    name: logs/mq-delivery.log
    max-size: 100MB
    max-history: 30
